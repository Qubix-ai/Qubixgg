<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qubix — Kill the Chaos. Crown the Flow.</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* ───────── BASE ───────── */
body{
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:#06040F;
  color:#F0EDFF;
  overflow-x:hidden;
}

/* ───────── BACKGROUND ───────── */
.bg-gradient{
  position:fixed;
  inset:0;
  z-index:0;

  background:
    radial-gradient(circle at 20% 30%, rgba(124,58,237,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(236,72,153,0.18), transparent 45%),
    linear-gradient(135deg,#0B061A,#140A2E,#1A0F3A);

  filter:blur(40px);
  animation:gradientMove 12s ease-in-out infinite alternate;
}

@keyframes gradientMove{
  0%{transform:scale(1)}
  100%{transform:scale(1.1) translateY(-20px)}
}

/* ───────── CANVAS ───────── */
#bg-canvas{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
}

/* ───────── CONTENT ───────── */
.container{
  position:relative;
  z-index:2;
  max-width:1100px;
  margin:auto;
  padding:120px 20px;
  text-align:center;
}

h1{
  font-family:'Sora';
  font-size:64px;
  line-height:1;
}

p{
  color:#aaa;
  max-width:500px;
  margin:20px auto;
}

/* ───────── BUTTON ───────── */
.btn{
  padding:14px 28px;
  background:linear-gradient(135deg,#7C3AED,#9333EA);
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  display:inline-block;
  margin-top:20px;
  box-shadow:0 10px 30px rgba(124,58,237,.4);
}

/* ───────── LOGO STRIP ───────── */
.logo-strip{
  margin-top:80px;
  overflow:hidden;
}

.logo-track{
  display:flex;
  gap:40px;
  animation:scroll 20s linear infinite;
}

.logo{
  display:flex;
  align-items:center;
  gap:8px;
  color:#888;
  font-size:14px;
}

.logo img{
  width:18px;
  height:18px;
}

@keyframes scroll{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

/* ───────── FLOATING UI ELEMENTS ───────── */
.floating-box{
  position:absolute;
  width:120px;
  height:120px;
  border-radius:20px;
  background:linear-gradient(135deg,#804A8A,#3A0353);
  opacity:0.15;
  filter:blur(10px);
  animation:float 8s ease-in-out infinite alternate;
}

.floating-box.two{
  background:linear-gradient(135deg,#F8D299,#F59E51);
  left:70%;
  top:60%;
  animation-delay:2s;
}

@keyframes float{
  0%{transform:translateY(0)}
  100%{transform:translateY(-40px)}
}

</style>
</head>

<body>

<div class="bg-gradient"></div>
<canvas id="bg-canvas"></canvas>

<!-- FLOATING SHAPES -->
<div class="floating-box" style="top:20%; left:15%;"></div>
<div class="floating-box two"></div>

<div class="container">

<h1>Kill the Chaos.<br><span style="color:#C084FC;">Crown the Flow.</span></h1>

<p>Turn your attention into predictable income using AI-powered systems. No guessing. No burnout.</p>

<a href="#" class="btn">Get Started</a>

<!-- LOGO STRIP -->
<div class="logo-strip">
  <div class="logo-track">

    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"> Facebook</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"> X</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"> Instagram</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"> TikTok</div>

    <!-- duplicate for infinite scroll -->
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg"> Facebook</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/x.svg"> X</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg"> Instagram</div>
    <div class="logo"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/tiktok.svg"> TikTok</div>

  </div>
</div>

</div>

<script>

/* ───────── CANVAS GRAPH SYSTEM ───────── */

const canvas = document.getElementById("bg-canvas");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* nodes */
let nodes = Array.from({length:40},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  dx:(Math.random()-0.5)*0.5,
  dy:(Math.random()-0.5)*0.5
}));

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  nodes.forEach(n=>{
    n.x += n.dx;
    n.y += n.dy;

    if(n.x<0||n.x>canvas.width) n.dx*=-1;
    if(n.y<0||n.y>canvas.height) n.dy*=-1;

    ctx.beginPath();
    ctx.arc(n.x,n.y,2,0,Math.PI*2);
    ctx.fillStyle="rgba(168,85,247,0.8)";
    ctx.fill();
  });

  /* connections */
  for(let i=0;i<nodes.length;i++){
    for(let j=i+1;j<nodes.length;j++){
      let dx = nodes[i].x - nodes[j].x;
      let dy = nodes[i].y - nodes[j].y;
      let dist = Math.sqrt(dx*dx + dy*dy);

      if(dist < 120){
        ctx.beginPath();
        ctx.moveTo(nodes[i].x,nodes[i].y);
        ctx.lineTo(nodes[j].x,nodes[j].y);
        ctx.strokeStyle="rgba(168,85,247,0.08)";
        ctx.stroke();
      }
    }
  }

  requestAnimationFrame(animate);
}

animate();

/* ───────── SCROLL PARALLAX ───────── */
window.addEventListener("scroll",()=>{
  const scroll = window.scrollY;
  document.querySelector(".bg-gradient").style.transform =
    `translateY(${scroll * -0.05}px) scale(1.1)`;
});

</script>

</body>
</html>
