<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qubix | Premium AI Leverage</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           GLOBAL VARIABLES & THEME
           ========================================= */
        :root {
            --bg-base: #030305;
            --bg-glass: rgba(255, 255, 255, 0.02);
            --border-glass: rgba(255, 255, 255, 0.08);
            
            --c-purple: #7C3AED;
            --c-indigo: #4F46E5;
            --c-blue: #2563EB;
            --c-sky: #0EA5E9;
            
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.65);
            --text-highlight: rgba(255, 255, 255, 0.95);
            
            --easing-smooth: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* Only hide native cursor if JS successfully enables the custom one */
        body.custom-cursor-active * { cursor: none; }
        
        html { scroll-behavior: smooth; background-color: var(--bg-base); }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-base);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
            position: relative;
        }

        /* =========================================
           CUSTOM CURSOR
           ========================================= */
        .cursor-dot, .cursor-outline {
            position: fixed; top: 0; left: 0; transform: translate(-50%, -50%);
            border-radius: 50%; z-index: 9999; pointer-events: none; opacity: 0;
            transition: opacity 0.3s;
        }
        body.custom-cursor-active .cursor-dot, 
        body.custom-cursor-active .cursor-outline { opacity: 1; }
        
        .cursor-dot { width: 6px; height: 6px; background-color: var(--c-sky); }
        .cursor-outline {
            width: 40px; height: 40px; border: 1px solid rgba(14, 165, 233, 0.5);
            transition: width 0.2s, height 0.2s, background-color 0.2s, opacity 0.3s;
        }
        .cursor-outline.hover {
            width: 60px; height: 60px; background-color: rgba(14, 165, 233, 0.1); border-color: transparent;
        }

        /* =========================================
           BACKGROUND & ATMOSPHERE
           ========================================= */
        .bg-grid {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.15;
            background-size: 50px 50px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.1) 1px, transparent 1px);
            mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at 50% 50%, black, transparent 80%);
        }

        .vignette {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            background: radial-gradient(circle at center, transparent 30%, #030305 100%);
        }

        .noise {
            position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.035;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .ambient-orb {
            position: fixed; border-radius: 50%; filter: blur(140px); opacity: 0.35;
            pointer-events: none; z-index: 0; mix-blend-mode: screen;
        }
        .orb-purple { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--c-purple); animation: float 25s ease-in-out infinite alternate; }
        .orb-indigo { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--c-indigo); animation: float 20s ease-in-out infinite alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 10%) scale(1.1); }
        }

        /* =========================================
           UTILITIES & TYPOGRAPHY
           ========================================= */
        .container { max-width: 1240px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10; }
        
        .glass-panel {
            background: var(--bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass); border-radius: 24px; position: relative; overflow: hidden;
        }

        h1, h2, h3, h4 { letter-spacing: -0.04em; line-height: 1.1; }
        
        .text-gradient {
            background: linear-gradient(180deg, #FFFFFF 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .text-glow {
            background: linear-gradient(to right, var(--c-sky), var(--c-purple), var(--c-indigo), var(--c-sky));
            background-size: 200% auto;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gradientShine 4s linear infinite;
        }

        @keyframes gradientShine { to { background-position: 200% center; } }

        .italic-serif { font-family: 'Playfair Display', serif; font-style: italic; font-weight: 400; padding-right: 8px; }
        .highlight-word { color: var(--text-highlight); font-weight: 500; }

        /* =========================================
           NAVIGATION
           ========================================= */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            padding: 24px 0; transition: all 0.4s var(--easing-smooth);
        }
        nav.scrolled {
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass); padding: 16px 0;
        }
        .nav-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo {
            font-weight: 700; font-size: 1.4rem; letter-spacing: -0.05em; color: #fff;
            display: flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .social-icons { display: flex; gap: 12px; }
        .social-icons a {
            display: flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; border-radius: 50%; background: var(--bg-glass);
            border: 1px solid var(--border-glass); color: var(--text-muted);
            transition: all 0.3s var(--easing-smooth); text-decoration: none;
        }
        .social-icons a:hover {
            color: #fff; background: rgba(255,255,255,0.1); transform: translateY(-3px);
            border-color: rgba(124, 58, 237, 0.4); box-shadow: 0 10px 20px -10px var(--c-purple);
        }

        /* =========================================
           BUTTONS (MAGNETIC)
           ========================================= */
        .btn-group { display: flex; gap: 16px; justify-content: center; align-items: center; margin-top: 40px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 32px; border-radius: 100px; font-weight: 500; font-size: 1rem;
            text-decoration: none; position: relative; overflow: hidden; border: none;
            transition: transform 0.2s var(--easing-smooth); z-index: 10;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--c-indigo), var(--c-purple)); color: #fff;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 10px 30px -10px rgba(124, 58, 237, 0.6);
        }
        .btn-primary::before {
            content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, var(--c-sky), var(--c-purple));
            opacity: 0; transition: opacity 0.4s ease; z-index: -1;
        }
        .btn-primary:hover::before { opacity: 1; }
        .btn-secondary { background: var(--bg-glass); color: #fff; border: 1px solid var(--border-glass); }
        .btn-secondary:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.2); }

        /* =========================================
           HERO SECTION (FIXED FOR LOAD)
           ========================================= */
        .hero {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding-top: 120px; padding-bottom: 80px; position: relative;
        }
        
        /* SAFE LOAD ANIMATION - GUARANTEES VISIBILITY */
        .hero-safe-load {
            animation: safeFadeIn 1.2s var(--easing-smooth) forwards;
            opacity: 0; transform: translateY(20px);
        }
        @keyframes safeFadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .hero-badge {
            display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border-radius: 100px;
            background: rgba(124, 58, 237, 0.1); border: 1px solid rgba(124, 58, 237, 0.2);
            font-size: 0.85rem; font-weight: 500; color: #a78bfa; margin-bottom: 32px;
        }

        .hero-title { font-size: clamp(3rem, 7vw, 5.5rem); font-weight: 700; margin-bottom: 24px; z-index: 2; position: relative; }
        .hero-subtitle {
            font-size: clamp(1.1rem, 1.5vw, 1.25rem); color: var(--text-muted); max-width: 650px;
            margin: 0 auto; font-weight: 400; z-index: 2; position: relative;
        }

        .hero-proof {
            display: flex; align-items: center; gap: 16px; margin-top: 60px; padding: 12px 24px;
            border-radius: 100px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px); width: fit-content; margin-left: auto; margin-right: auto;
        }
        .avatars { display: flex; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--bg-base);
            margin-left: -12px; object-fit: cover;
        }
        .avatar:first-child { margin-left: 0; }
        .proof-text { text-align: left; font-size: 0.85rem; color: var(--text-muted); }
        .stars { color: #F59E0B; font-size: 0.8rem; margin-bottom: 2px; }

        /* =========================================
           FEATURES / BENTO GRID
           ========================================= */
        .section-padding { padding: 120px 0; }
        .section-header { text-align: center; margin-bottom: 64px; }
        .section-title { font-size: clamp(2.5rem, 5vw, 3.5rem); font-weight: 700; margin-bottom: 16px; }

        .bento-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
        .bento-card {
            padding: 40px; display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.4s var(--easing-smooth), box-shadow 0.4s ease;
        }
        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }

        .bento-card::before {
            content: ""; position: absolute; inset: 0; border-radius: inherit; padding: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.8), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .bento-card:hover { transform: translateY(-5px); }
        .bento-card:hover::before { opacity: 1; animation: borderSweep 2s linear infinite; }

        @keyframes borderSweep {
            0% { background-position: 0% center; background-size: 200% auto; }
            100% { background-position: 200% center; background-size: 200% auto; }
        }

        .feature-icon {
            width: 48px; height: 48px; border-radius: 12px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.1); font-size: 1.5rem;
        }
        .feature-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; color: #fff; }
        .feature-desc { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }

        .motion-graphic {
            height: 120px; width: 100%; margin-top: 32px; border-radius: 12px;
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.03);
            position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .wire-container { position: absolute; width: 100%; height: 2px; background: rgba(255,255,255,0.05); }
        .light-beam {
            position: absolute; top: 0; left: -50px; width: 50px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--c-sky), #fff);
            box-shadow: 0 0 10px var(--c-sky), 0 0 20px var(--c-purple);
            animation: shootLight 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }
        @keyframes shootLight { 0% { left: -10%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 110%; opacity: 0; } }

        /* =========================================
           STATS & TESTIMONIALS
           ========================================= */
        .stats-wrap { border-top: 1px solid var(--border-glass); border-bottom: 1px solid var(--border-glass); background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 60px 0; text-align: center; }
        .stat-item { position: relative; }
        .stat-number { font-size: 3.5rem; font-family: 'Playfair Display', serif; font-weight: 600; color: #fff; line-height: 1; margin-bottom: 8px; }
        .stat-label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        .testimonials { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
        .review-card { padding: 32px; }
        .review-text { font-size: 1rem; color: var(--text-highlight); margin-bottom: 24px; font-style: italic; }
        .reviewer { display: flex; align-items: center; gap: 12px; }
        .reviewer img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border-glass); }
        .reviewer-info h4 { font-size: 0.95rem; color: #fff; }
        .reviewer-info p { font-size: 0.8rem; color: var(--text-muted); }

        /* =========================================
           PRICING
           ========================================= */
        .pricing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; max-width: 900px; margin: 0 auto; }
        .price-card { padding: 48px; display: flex; flex-direction: column; }
        .price-card.premium {
            background: linear-gradient(180deg, rgba(124, 58, 237, 0.08) 0%, rgba(3, 3, 5, 0) 100%);
            border-color: rgba(124, 58, 237, 0.4); box-shadow: 0 0 80px -20px rgba(124, 58, 237, 0.2);
        }
        .price-card.premium::after {
            content: ''; position: absolute; top: -1px; left: 10%; width: 80%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--c-purple), var(--c-sky), transparent);
        }
        .plan-name { font-size: 1.25rem; font-weight: 600; margin-bottom: 12px; }
        .plan-price { font-size: 3.5rem; font-weight: 700; color: #fff; margin-bottom: 8px; line-height: 1; }
        .plan-price span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
        .plan-desc { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 32px; }
        .feature-list { list-style: none; margin-bottom: 40px; flex-grow: 1; }
        .feature-list li { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; color: var(--text-highlight); font-size: 0.95rem; }
        .feature-list svg { width: 20px; height: 20px; color: var(--c-sky); flex-shrink: 0; margin-top: 2px; }

        footer { padding: 60px 0 40px; border-top: 1px solid var(--border-glass); text-align: center; }
        .footer-logo { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 16px; }

        /* =========================================
           SCROLL REVEAL UTILS
           ========================================= */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s var(--easing-smooth); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }

        /* =========================================
           RESPONSIVE
           ========================================= */
        @media (max-width: 992px) {
            .col-8, .col-4 { grid-column: span 12; }
            .testimonials { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 40px; }
        }
        @media (max-width: 768px) {
            .hero-title { font-size: 2.5rem; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
            .pricing-grid { grid-template-columns: 1fr; }
            .cursor-dot, .cursor-outline { display: none !important; }
            body.custom-cursor-active * { cursor: auto; }
        }
    </style>
</head>
