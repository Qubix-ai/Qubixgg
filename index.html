<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qubix — Kill the Chaos. Crown the Flow.</title>
<meta name="description" content="Qubix helps micro-creators under 100k followers turn attention into predictable $0→$5k/month income using AI-powered systems. No burnout. No guessing.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,700;1,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root{
  --bg:#06040F;
  --bg1:#0A0818;
  --bg2:#100E1F;
  --bg3:#160F2B;
  --line:rgba(255,255,255,0.06);
  --line2:rgba(255,255,255,0.10);
  --line3:rgba(255,255,255,0.18);
  --txt:#F0EDFF;
  --txt2:#8B83B8;
  --txt3:#3E3860;
  --p:#7C3AED;
  --p2:#9333EA;
  --acc:#A855F7;
  --sky:#818CF8;
  --pink:#EC4899;
  --green:#10B981;
  --amber:#F59E0B;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:3px}

/* NOISE */
body::after{content:'';position:fixed;inset:0;z-index:997;pointer-events:none;opacity:.03;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
background-size:180px}

/* CURSOR */
#qcur{position:fixed;width:8px;height:8px;background:rgba(168,85,247,.9);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 16px rgba(168,85,247,.6);transition:width .15s,height .15s,opacity .15s}
#qring{position:fixed;width:34px;height:34px;border:1px solid rgba(168,85,247,.25);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .08s linear}

/* CANVAS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid var(--line);background:rgba(6,4,15,.8);backdrop-filter:blur(24px) saturate(180%)}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-family:'Sora',sans-serif;font-weight:700;font-size:16px;color:var(--txt);letter-spacing:-.03em}
.nav-logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--p),var(--pink));display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(124,58,237,.5)}
.nav-logo-icon svg{width:16px;height:16px;fill:#fff}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-link{font-size:13px;font-weight:400;color:var(--txt2);text-decoration:none;padding:6px 13px;border-radius:8px;transition:color .2s,background .2s}
.nav-link:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nav-right{display:flex;align-items:center;gap:8px}
.social-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--line2);background:transparent;display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--txt2);transition:all .2s}
.social-btn:hover{border-color:var(--line3);color:var(--txt);background:rgba(255,255,255,.04)}
.social-btn svg{width:14px;height:14px;fill:currentColor}
.nav-cta{display:flex;align-items:center;gap:6px;padding:7px 16px;font-size:13px;font-weight:600;color:#fff;background:var(--p2);border:none;border-radius:9px;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 0 0 1px rgba(255,255,255,.08) inset,0 4px 20px rgba(147,51,234,.4)}
.nav-cta:hover{background:var(--acc);box-shadow:0 4px 28px rgba(168,85,247,.5);transform:translateY(-1px)}
.nav-mobile-toggle{display:none;background:none;border:1px solid var(--line2);color:var(--txt2);border-radius:7px;padding:6px 9px;cursor:pointer;font-size:16px}

/* ── HERO ── */
#hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:130px 24px 80px;position:relative;overflow:hidden}
.hero-glow{position:absolute;top:-5%;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse at center,rgba(124,58,237,.2) 0%,rgba(99,38,220,.07) 40%,transparent 70%);filter:blur(50px);pointer-events:none;animation:glowPulse 7s ease-in-out infinite alternate}
@keyframes glowPulse{0%{opacity:.7;transform:translateX(-50%) scale(1)}100%{opacity:1;transform:translateX(-50%) scale(1.07)}}
.hero-beam{position:absolute;pointer-events:none;background:linear-gradient(to bottom,transparent,rgba(168,85,247,.1),transparent);width:1px}
.b1{height:100vh;top:0;left:20%;transform:rotate(22deg);animation:beamAnim 9s ease-in-out infinite alternate}
.b2{height:100vh;top:0;right:20%;transform:rotate(-22deg);animation:beamAnim 9s ease-in-out infinite alternate-reverse}
.b3{height:80vh;top:0;left:10%;transform:rotate(32deg);opacity:.4;animation:beamAnim 12s ease-in-out infinite alternate}
.b4{height:80vh;top:0;right:10%;transform:rotate(-32deg);opacity:.4;animation:beamAnim 12s ease-in-out infinite alternate-reverse}
@keyframes beamAnim{0%{opacity:.2}100%{opacity:.8}}

.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 8px 5px 12px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22);border-radius:100px;margin-bottom:28px;font-size:11.5px;font-weight:500;color:var(--txt2);position:relative;z-index:2;animation:fadeUp .8s cubic-bezier(.16,1,.3,1) both}
.hero-badge-pill{padding:2px 9px;background:var(--p2);border-radius:100px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.05em}
.hero-h1{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(44px,7.5vw,100px);letter-spacing:-.045em;line-height:.9;color:var(--txt);max-width:760px;margin-bottom:10px;position:relative;z-index:2;animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .1s both}
.hero-h1 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;background:linear-gradient(135deg,#fff 0%,#C084FC 40%,#EC4899 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block}
.hero-sub{font-size:clamp(14px,1.4vw,16px);color:var(--txt2);max-width:430px;line-height:1.7;font-weight:400;margin:22px auto 38px;position:relative;z-index:2;animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .2s both}
.hero-sub strong{color:rgba(240,237,255,.85);font-weight:500}

.hero-btns{display:flex;align-items:center;gap:12px;justify-content:center;flex-wrap:wrap;position:relative;z-index:2;animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .3s both}
.btn-primary{display:inline-flex;align-items:center;gap:7px;padding:13px 26px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--p),var(--p2));border:none;border-radius:11px;cursor:pointer;text-decoration:none;transition:all .25s;box-shadow:0 4px 22px rgba(124,58,237,.4),0 0 0 1px rgba(255,255,255,.08) inset}
.btn-primary:hover{background:linear-gradient(135deg,var(--p2),var(--acc));box-shadow:0 4px 32px rgba(168,85,247,.55);transform:translateY(-2px) scale(1.02)}
.btn-secondary{display:inline-flex;align-items:center;gap:7px;padding:13px 26px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--txt2);background:rgba(255,255,255,.04);border:1px solid var(--line2);border-radius:11px;cursor:pointer;text-decoration:none;transition:all .25s}
.btn-secondary:hover{color:var(--txt);border-color:var(--line3);background:rgba(255,255,255,.07);transform:translateY(-1px)}
.btn-arrow{font-size:16px;transition:transform .2s}
.btn-primary:hover .btn-arrow{transform:translateX(3px)}

.hero-proof{margin-top:22px;font-size:11.5px;color:var(--txt3);display:flex;align-items:center;gap:8px;justify-content:center;position:relative;z-index:2;animation:fadeUp .9s cubic-bezier(.16,1,.3,1) .4s both}
.hero-stars{color:#F59E0B;letter-spacing:1px;font-size:10px}
.proof-avs{display:flex}
.proof-av{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--bg);font-size:7px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;margin-left:-5px}
.proof-av:first-child{margin-left:0}

/* HERO MOCKUP */
.hero-mockup-wrap{position:relative;z-index:2;margin-top:60px;width:100%;max-width:820px;animation:fadeUp 1s cubic-bezier(.16,1,.3,1) .5s both}
50%{transform:translateY(-8px) perspective(1200px) rotateX(.8deg)}}
.hero-mockup{border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.1);box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 50px 100px rgba(0,0,0,.8),0 0 80px rgba(124,58,237,.1)}
.m-bar{background:rgba(12,10,24,.95);padding:9px 14px;display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--line)}
.m-dot{width:9px;height:9px;border-radius:50%}
.m-body{background:rgba(8,6,20,.92);padding:20px;display:grid;grid-template-columns:160px 1fr;gap:14px;min-height:220px}
.m-sidebar{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:10px;padding:14px}
.m-si{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:7px;font-size:11px;color:var(--txt3);margin-bottom:2px}
.m-si.act{background:rgba(124,58,237,.12);color:var(--acc)}
.m-si-dot{width:5px;height:5px;border-radius:50%;background:var(--acc);flex-shrink:0}
.m-main{display:flex;flex-direction:column;gap:10px}
.m-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.m-stat{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:9px;padding:12px}
.m-stat-lbl{font-size:9px;color:var(--txt3);margin-bottom:3px}
.m-stat-val{font-size:16px;font-weight:700;letter-spacing:-.03em;color:var(--txt)}
.m-stat-up{font-size:9px;color:var(--green);margin-top:2px}
.m-chart{background:rgba(255,255,255,.02);border:1px solid var(--line);border-radius:9px;padding:12px;flex:1}
.m-chart-lbl{font-size:9px;color:var(--txt3);margin-bottom:6px}
.m-bars-wrap{display:flex;align-items:flex-end;gap:3px;height:52px}
.m-bar-item{flex:1;border-radius:2px 2px 0 0;background:rgba(124,58,237,.18)}
.m-bar-item.hi{background:linear-gradient(to top,var(--p),var(--acc));animation:barRise .9s cubic-bezier(.16,1,.3,1) both}
@keyframes barRise{from{transform:scaleY(0);transform-origin:bottom}to{transform:scaleY(1)}}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

/* ── LOGO STRIP ── */
.logo-strip{padding:44px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);position:relative;z-index:1;overflow:hidden}
.logo-strip-lbl{text-align:center;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--txt3);margin-bottom:24px}
.logo-track{overflow:hidden;-webkit-mask-image:linear-gradient(to right,transparent 0%,#000 10%,#000 90%,transparent 100%);mask-image:linear-gradient(to right,transparent 0%,#000 10%,#000 90%,transparent 100%)}
.logo-inner{display:flex;align-items:center;animation:logoScroll 26s linear infinite;width:max-content}
.logo-inner:hover{animation-play-state:paused}
@keyframes logoScroll{to{transform:translateX(-50%)}}
.logo-chip{display:flex;align-items:center;gap:8px;padding:8px 24px;border-right:1px solid var(--line);font-size:12px;font-weight:600;color:var(--txt3);white-space:nowrap}

/* ── SECTIONS ── */
.section{padding:90px 24px;max-width:1140px;margin:0 auto;position:relative;z-index:1}
.eyebrow{font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--txt3);margin-bottom:14px;display:inline-flex;align-items:center;gap:8px}
.eyebrow::before{content:'';display:block;width:20px;height:1px;background:var(--p);border-radius:1px}
.sec-title{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(32px,4.5vw,56px);letter-spacing:-.04em;line-height:.93;color:var(--txt);margin-bottom:14px}
.sec-title em{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;background:linear-gradient(135deg,#C084FC,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-body{font-size:15px;color:var(--txt2);line-height:1.7;max-width:480px}
.sec-body strong{color:rgba(240,237,255,.8);font-weight:500}

/* ── PROBLEM SECTION ── */
.problem-section{position:relative;z-index:1;overflow:hidden;border-top:1px solid var(--line)}
.problem-bg{position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 100%,rgba(124,58,237,.1) 0%,transparent 70%);pointer-events:none}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:520px;align-items:stretch;max-width:1140px;margin:0 auto}
.problem-left{padding:90px 60px 90px 24px;display:flex;flex-direction:column;justify-content:center}
.problem-right{position:relative;border-left:1px solid var(--line);display:flex;align-items:center;justify-content:center;padding:60px 24px}
.pain-cards{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
.pain-card{background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:12px;padding:16px 18px;display:flex;align-items:flex-start;gap:12px;transition:all .3s;position:relative;overflow:hidden}
.pain-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,58,237,.06),transparent);opacity:0;transition:opacity .3s;pointer-events:none}
.pain-card:hover{border-color:rgba(124,58,237,.3);transform:translateX(4px)}
.pain-card:hover::before{opacity:1}
.pain-icon{width:36px;height:36px;border-radius:9px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.pain-title{font-size:13px;font-weight:600;color:var(--txt);margin-bottom:3px}
.pain-desc{font-size:12px;color:var(--txt2);line-height:1.5}

/* ── PRODUCTS ── */
.products-section{border-top:1px solid var(--line);position:relative;overflow:hidden}
.products-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:600px;height:300px;background:radial-gradient(ellipse at top,rgba(168,85,247,.12),transparent 70%);pointer-events:none}
.products-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:48px}
.product-card{border-radius:20px;border:1px solid var(--line2);background:rgba(255,255,255,.02);padding:36px;position:relative;overflow:hidden;transition:all .35s;cursor:pointer}
.product-card::before{content:'';position:absolute;inset:-1px;border-radius:21px;background:linear-gradient(135deg,rgba(168,85,247,.2),rgba(236,72,153,.1),transparent 60%);opacity:0;transition:opacity .35s;pointer-events:none;z-index:0}
.product-card:hover{transform:translateY(-4px);border-color:rgba(168,85,247,.3);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(124,58,237,.1)}
.product-card:hover::before{opacity:1}
.product-card>*{position:relative;z-index:1}
.product-card.featured{border-color:rgba(168,85,247,.35);background:rgba(124,58,237,.06)}
.product-card.featured::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,.5),transparent)}
.product-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px}
.product-badge.free{background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.25);color:var(--green)}
.product-badge.paid{background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25);color:var(--acc)}
.product-price{font-family:'Sora',sans-serif;font-size:42px;font-weight:800;letter-spacing:-.04em;color:var(--txt);margin:8px 0}
.product-price span{font-size:16px;color:var(--txt2);font-weight:400;font-family:'DM Sans',sans-serif}
.product-title{font-family:'Sora',sans-serif;font-size:20px;font-weight:700;color:var(--txt);margin-bottom:8px;letter-spacing:-.02em}
.product-desc{font-size:13.5px;color:var(--txt2);line-height:1.65;margin-bottom:24px}
.product-features{list-style:none;display:flex;flex-direction:column;gap:9px;margin-bottom:28px}
.product-features li{display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--txt2)}
.product-features li::before{content:'';width:16px;height:16px;border-radius:50%;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);flex-shrink:0;margin-top:1px;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 16 16' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M3 8l3.5 3.5L13 5' stroke='%2310B981' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-size:14px;background-repeat:no-repeat;background-position:center}
.product-cta{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;font-size:14px;font-weight:600;border-radius:11px;text-decoration:none;transition:all .25s;cursor:pointer;border:none}
.product-cta.primary{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.product-cta.primary:hover{background:linear-gradient(135deg,var(--p2),var(--acc));box-shadow:0 4px 30px rgba(168,85,247,.55);transform:translateY(-1px)}
.product-cta.ghost{background:transparent;color:var(--txt2);border:1px solid var(--line2)}
.product-cta.ghost:hover{color:var(--txt);border-color:var(--line3);background:rgba(255,255,255,.04);transform:translateY(-1px)}

/* ── HOW IT WORKS ── */
.how-section{border-top:1px solid var(--line);position:relative;overflow:hidden}
.how-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;margin-top:56px;border:1px solid var(--line);border-radius:18px;overflow:hidden}
.how-step{padding:36px 32px;position:relative;border-right:1px solid var(--line)}
.how-step:last-child{border-right:none}
.how-step::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(168,85,247,0),transparent);transition:all .5s}
.how-step:hover::before{background:linear-gradient(90deg,transparent,rgba(168,85,247,.5),transparent)}
.how-step-num{width:40px;height:40px;border-radius:11px;background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.22);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-size:14px;font-weight:700;color:var(--acc);margin-bottom:20px}
.how-step-title{font-family:'Sora',sans-serif;font-size:17px;font-weight:700;color:var(--txt);letter-spacing:-.02em;margin-bottom:10px}
.how-step-desc{font-size:13px;color:var(--txt2);line-height:1.65}
.how-connector{position:absolute;top:32px;right:-1px;width:2px;height:40px;background:linear-gradient(to bottom,var(--p),transparent)}

/* ── FEATURES / BENTO ── */
.features-section{border-top:1px solid var(--line);position:relative;overflow:hidden}
.bento-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:auto auto;gap:14px;margin-top:50px}
.bento-card{border-radius:18px;border:1px solid var(--line);background:rgba(255,255,255,.02);padding:28px;position:relative;overflow:hidden;transition:all .3s}
.bento-card:hover{border-color:rgba(168,85,247,.25);box-shadow:0 16px 40px rgba(0,0,0,.4)}
.bento-card.wide{grid-column:span 2}
.bento-card.tall{grid-row:span 2}
.bento-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:18px;font-size:20px}
.bento-icon.purple{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.2)}
.bento-icon.pink{background:rg
