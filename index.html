<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qubix — Kill the Chaos. Crown the Flow.</title>
<meta name="description" content="AI-powered monetization systems for micro-creators under 100k followers.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@1,700;1,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ═══════ TOKENS ═══════ */
:root{
  --bg:#050410;--bg1:#080620;--bg2:#0d0a28;
  --p:#7C3AED;--p2:#9333EA;--acc:#A855F7;--sky:#818CF8;
  --pink:#EC4899;--green:#10B981;--amber:#F59E0B;
  --txt:#F0EDFF;--txt2:#8680B8;--txt3:#3A3460;
  --line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
::-webkit-scrollbar{width:2px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}

/* CURSOR */
#cur-dot{position:fixed;width:6px;height:6px;background:#fff;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
#cur-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(168,85,247,0.45);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}

/* NOISE */
#noise{position:fixed;inset:0;z-index:998;pointer-events:none;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px}

/* PROGRESS */
#prog{position:fixed;top:0;left:0;z-index:9999;height:1.5px;width:0;background:linear-gradient(90deg,var(--p),var(--acc),var(--pink));pointer-events:none}

/* CANVAS */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* INTRO */
#intro{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .8s cubic-bezier(.4,0,.2,1),transform 1s cubic-bezier(.4,0,.2,1)}
#intro.out{opacity:0;transform:scale(1.06);pointer-events:none}
.intro-logo-img{width:100px;height:100px;object-fit:contain;border-radius:20px;opacity:0;animation:iUp 1s cubic-bezier(.16,1,.3,1) .3s forwards}
.intro-name{font-family:'Sora',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.04em;color:var(--txt);opacity:0;animation:iUp 1s cubic-bezier(.16,1,.3,1) .5s forwards}
.intro-bar-wrap{width:140px;height:1px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;opacity:0;animation:iUp .8s cubic-bezier(.16,1,.3,1) .7s forwards}
.intro-bar{height:100%;background:linear-gradient(90deg,var(--p),var(--acc));width:0;animation:iBar 1.6s cubic-bezier(.4,0,.2,1) .9s forwards}
@keyframes iUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes iBar{from{width:0}to{width:100%}}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;height:66px;display:flex;align-items:center;justify-content:space-between;padding:0 36px;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(5,4,16,.85);backdrop-filter:blur(28px) saturate(180%);border-bottom-color:var(--line)}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-logo img{height:32px;width:auto;object-fit:contain}
.nav-logo span{font-family:'Sora',sans-serif;font-weight:700;font-size:15px;letter-spacing:-.03em;color:var(--txt)}
.nav-links{display:flex;align-items:center;gap:2px}
.nav-a{font-size:13px;color:var(--txt2);text-decoration:none;padding:6px 13px;border-radius:8px;transition:color .2s,background .2s;position:relative}
.nav-a::after{content:'';position:absolute;bottom:3px;left:13px;right:13px;height:1px;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform .3s cubic-bezier(.16,1,.3,1)}
.nav-a:hover{color:var(--txt);background:rgba(255,255,255,.04)}
.nav-a:hover::after{transform:scaleX(1)}
.nav-r{display:flex;align-items:center;gap:8px}
.soc-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;text-decoration:none;color:var(--txt2);transition:all .25s}
.soc-btn svg{width:14px;height:14px;fill:currentColor}
.soc-btn:hover{border-color:rgba(168,85,247,.4);color:var(--txt);background:rgba(168,85,247,.08)}
.nav-cta{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;font-size:13px;font-weight:600;color:#fff;background:var(--p2);border:none;border-radius:10px;text-decoration:none;transition:all .3s;box-shadow:0 4px 24px rgba(147,51,234,.35),0 0 0 1px rgba(255,255,255,.1) inset}
.nav-cta:hover{background:var(--acc);box-shadow:0 4px 32px rgba(168,85,247,.5);transform:translateY(-1px)}
.mob-btn{display:none;background:none;border:1px solid var(--line2);color:var(--txt2);border-radius:8px;padding:6px 10px;font-size:16px}
.mob-nav{display:none;flex-direction:column;gap:4px;position:fixed;top:66px;left:0;right:0;z-index:99;background:rgba(5,4,16,.97);backdrop-filter:blur(28px);border-bottom:1px solid var(--line);padding:14px 20px 18px}
.mob-nav.open{display:flex}
.mob-nav .nav-a{font-size:15px;padding:10px 13px}

/* HERO */
#hero{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:140px 24px 100px;overflow:hidden}
.hero-ring{position:absolute;border-radius:50%;border:1px solid rgba(124,58,237,0.09);pointer-events:none;left:50%;top:50%;transform:translate(-50%,-50%)}
.hr1{width:520px;height:520px;animation:rPulse 8s ease-in-out infinite}
.hr2{width:820px;height:820px;animation:rPulse 8s ease-in-out 1.2s infinite;border-color:rgba(124,58,237,.05)}
.hr3{width:1100px;height:1100px;animation:rPulse 8s ease-in-out 2.4s infinite;border-color:rgba(124,58,237,.03)}
@keyframes rPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.04)}}
.hero-glow{position:absolute;top:-12%;left:50%;transform:translateX(-50%);width:900px;height:520px;background:radial-gradient(ellipse,rgba(124,58,237,.17) 0%,rgba(99,38,220,.05) 45%,transparent 72%);filter:blur(55px);pointer-events:none;animation:gBreath 7s ease-in-out infinite alternate}
@keyframes gBreath{0%{opacity:.7}100%{opacity:1;transform:translateX(-50%) scale(1.06)}}
.morphblob{position:absolute;pointer-events:none;filter:blur(72px);border-radius:60% 40% 30% 70% / 60% 30% 70% 40%;animation:mBlob 14s ease-in-out infinite alternate}
@keyframes mBlob{0%{border-radius:60% 40% 30% 70% / 60% 30% 70% 40%}33%{border-radius:30% 60% 70% 40% / 50% 60% 30% 60%}66%{border-radius:50% 60% 40% 30% / 70% 40% 60% 30%}100%{border-radius:70% 30% 50% 50% / 40% 60% 30% 70%}}
.hbeam{position:absolute;width:1px;top:0;bottom:0;pointer-events:none}
.hb1{left:14%;background:linear-gradient(to bottom,transparent,rgba(124,58,237,.12) 50%,transparent);transform:rotate(18deg);transform-origin:top;animation:bFlicker 9s ease-in-out infinite alternate}
.hb2{right:14%;background:linear-gradient(to bottom,transparent,rgba(168,85,247,.1) 50%,transparent);transform:rotate(-18deg);transform-origin:top;animation:bFlicker 9s ease-in-out infinite alternate-reverse}
.hb3{left:4%;background:linear-gradient(to bottom,transparent,rgba(99,102,241,.07) 50%,transparent);transform:rotate(28deg);transform-origin:top;opacity:.5;animation:bFlicker 12s ease-in-out infinite alternate}
.hb4{right:4%;background:linear-gradient(to bottom,transparent,rgba(99,102,241,.07) 50%,transparent);transform:rotate(-28deg);transform-origin:top;opacity:.5;animation:bFlicker 12s ease-in-out infinite alternate-reverse}
@keyframes bFlicker{0%{opacity:.15}100%{opacity:.85}}
.scanline{position:absolute;left:0;right:0;height:1px;pointer-events:none;background:linear-gradient(90deg,transparent,rgba(168,85,247,.3),rgba(129,140,248,.3),transparent);animation:scanDown var(--sd,10s) linear infinite}
@keyframes scanDown{0%{top:-1px;opacity:0}5%{opacity:1}95%{opacity:1}100%{top:100%;opacity:0}}
.hero-badge{display:inline-flex;align-items:center;gap:8px;padding:5px 10px 5px 13px;background:rgba(124,58,237,.1);border:1px solid rgba(124,58,237,.22);border-radius:100px;margin-bottom:28px;font-size:11px;font-weight:500;color:var(--txt2);position:relative;z-index:2;opacity:0;animation:sUp 1s cubic-bezier(.16,1,.3,1) 2.7s forwards}
.badge-pill{padding:2px 9px;background:var(--p2);border-radius:100px;font-size:10px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.06em}
.hero-h1{font-family:'Sora',sans-serif;font-weight:900;font-size:clamp(50px,8.5vw,112px);letter-spacing:-.05em;line-height:.88;color:var(--txt);max-width:880px;position:relative;z-index:2;opacity:0;animation:sUp 1.1s cubic-bezier(.16,1,.3,1) 2.85s forwards}
.h1-line1{display:block}
.h1-line2{display:block;font-family:'Playfair Display',serif;font-style:italic;font-weight:700;background:linear-gradient(135deg,#fff 0%,#C084FC 30%,#EC4899 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-size:clamp(14px,1.5vw,17px);color:var(--txt2);max-width:470px;line-height:1.72;margin:22px auto 40px;position:relative;z-index:2;opacity:0;animation:sUp 1s cubic-bezier(.16,1,.3,1) 3s forwards}
.hero-sub strong{color:rgba(240,237,255,.85);font-weight:500}
.hero-btns{display:flex;align-items:center;gap:13px;justify-content:center;flex-wrap:wrap;position:relative;z-index:2;opacity:0;animation:sUp 1s cubic-bezier(.16,1,.3,1) 3.15s forwards}
@keyframes sUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
.btn-primary{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--p),var(--p2));border:none;border-radius:12px;text-decoration:none;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 4px 28px rgba(124,58,237,.42),0 0 0 1px rgba(255,255,255,.1) inset;position:relative;overflow:hidden}
.btn-primary::before{content:'';position:absolute;inset:-1px;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,.14),transparent 70%);transform:translateX(-100%);transition:transform .6s}
.btn-primary:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 8px 40px rgba(168,85,247,.58)}
.btn-primary:hover::before{transform:translateX(100%)}
.btn-sec{display:inline-flex;align-items:center;gap:7px;padding:13px 26px;font-size:14px;font-weight:500;color:var(--txt2);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.14);border-radius:12px;text-decoration:none;transition:all .3s}
.btn-sec:hover{color:var(--txt);border-color:rgba(168,85,247,.4);background:rgba(168,85,247,.07);transform:translateY(-2px)}
.hero-proof{margin-top:26px;display:flex;align-items:center;gap:10px;justify-content:center;position:relative;z-index:2;opacity:0;animation:sUp 1s cubic-bezier(.16,1,.3,1) 3.3s forwards}
.proof-stack{display:flex}
.proof-av{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg);margin-left:-7px;overflow:hidden;flex-shrink:0}
.proof-av:first-child{margin-left:0}
.proof-av img{width:100%;height:100%;object-fit:cover}
.proof-stars{color:var(--amber);font-size:11px;letter-spacing:1px}
.proof-txt{font-size:12px;color:var(--txt3)}

/* FLOATING LIVE BADGES */
.fbadge{position:absolute;z-index:3;background:rgba(8,6,28,.88);backdrop-filter:blur(14px);border:1px solid rgba(168,85,247,.22);border-radius:12px;padding:9px 13px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.04) inset;pointer-events:none;transition:opacity .4s}
.fbadge-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fbadge-val{font-size:12px;font-weight:700;color:var(--txt);font-family:'Sora',sans-serif;letter-spacing:-.01em}
.fbadge-lbl{font-size:9px;color:var(--txt3);margin-top:1px}
@keyframes fbFloat{0%{transform:translateY(0)}100%{transform:translateY(-11px)}}

/* SCROLL INDICATOR */
#scroll-ind{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:7px;z-index:10;opacity:0;animation:fadeIn .8s ease 4s forwards}
@keyframes fadeIn{to{opacity:1}}
.scroll-mouse{width:22px;height:36px;border:1.5px solid rgba(168,85,247,.38);border-radius:11px;position:relative}
.scroll-wheel{width:2.5px;height:6px;background:var(--acc);border-radius:2px;position:absolute;top:5px;left:50%;transform:translateX(-50%);animation:sWheel 1.8s ease-in-out infinite}
@keyframes sWheel{0%{transform:translateX(-50%) translateY(0);opacity:1}100%{transform:translateX(-50%) translateY(13px);opacity:0}}
.scroll-lbl{font-size:9px;color:rgba(168,85,247,.45);letter-spacing:.14em;text-transform:uppercase}

/* TICKER TAPE */
.ticker-wrap{overflow:hidden;background:rgba(124,58,237,.08);border-top:1px solid rgba(124,58,237,.15);border-bottom:1px solid rgba(124,58,237,.1);padding:7px 0}
.ticker-inner{display:flex;gap:0;animation:ticker 22s linear infinite;width:max-content}
.ticker-item{padding:0 28px;font-size:10px;font-weight:600;letter-spacing:.08em;white-space:nowrap;font-family:'Sora',sans-serif}

/* MARQUEE */
.mq-wrap{position:relative;z-index:1;overflow:hidden;padding:34px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);-webkit-mask-image:linear-gradient(to right,transparent,#000 12%,#000 88%,transparent);mask-image:linear-gradient(to right,transparent,#000 12%,#000 88%,transparent);background:rgba(5,4,16,.4)}
.mq-inner{display:flex;align-items:center;animation:mqScroll 30s linear infinite;width:max-content}
.mq-inner:hover{animation-play-state:paused}
@keyframes mqScroll{to{transform:translateX(-50%)}}
@keyframes ticker{to{transform:translateX(-50%)}}
.mq-chip{display:flex;align-items:center;gap:9px;padding:10px 28px;border-right:1px solid var(--line);font-size:12px;font-weight:500;color:var(--txt3);white-space:nowrap;letter-spacing:.04em;transition:color .25s}
.mq-chip:hover{color:var(--txt2)}
.mq-chip svg{opacity:.55;transition:opacity .25s;flex-shrink:0}
.mq-chip:hover svg{opacity:.85}

/* SECTION BASE */
.sec{padding:100px 24px;max-width:1160px;margin:0 auto;position:relative;z-index:1}
.eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--txt3);margin-bottom:14px}
.eyebrow::before{content:'';width:20px;height:1px;background:var(--p);border-radius:1px;display:block}
.sec-h2{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(32px,5vw,58px);letter-spacing:-.045em;line-height:.92;color:var(--txt);margin-bottom:14px}
.sec-h2 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;background:linear-gradient(135deg,#C084FC,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sec-p{font-size:15px;color:var(--txt2);line-height:1.72;max-width:500px}
.sec-p strong{color:rgba(240,237,255,.82);font-weight:500}
.sec-divider{height:1px;border:none;background:linear-gradient(90deg,transparent,var(--line) 20%,var(--line) 80%,transparent);margin:0 0 80px}
/* Animated draw-line */
.draw-line{height:1px;background:linear-gradient(90deg,transparent,var(--acc),var(--sky),transparent);width:0;transition:width 1.5s cubic-bezier(.4,0,.2,1);margin-bottom:80px}
.draw-line.in{width:100%}

/* ══ ORBITAL SECTION ══ */
.orbital-section{position:relative;padding:120px 24px;overflow:hidden;border-top:1px solid var(--line)}
.orbital-bg-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:700px;height:700px;background:radial-gradient(circle,rgba(124,58,237,.12) 0%,rgba(124,58,237,.04) 40%,transparent 70%);pointer-events:none}
.orbital-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.orbital-text h2{font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(32px,4.5vw,54px);letter-spacing:-.045em;line-height:.92;color:var(--txt);margin-bottom:16px}
.orbital-text h2 em{font-family:'Playfair Display',serif;font-style:italic;font-weight:700;background:linear-gradient(135deg,#C084FC,#EC4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.orbital-text p{font-size:15px;color:var(--txt2);line-height:1.72;margin-bottom:32px}

/* Orbital SVG container */
.orbital-svg-wrap{position:relative;width:440px;height:440px;flex-shrink:0}
.orbital-core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:50%;background:radial-gradient(circle,rgba(168,85,247,.3),rgba(124,58,237,.1));border:1px solid rgba(168,85,247,.4);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(168,85,247,.25),0 0 80px rgba(124,58,237,.1);animation:corePulse 3s ease-in-out infinite alternate;z-index:5}
@keyframes corePulse{0%{box-shadow:0 0 30px rgba(168,85,247,.2),0 0 60px rgba(124,58,237,.08)}100%{box-shadow:0 0 60px rgba(168,85,247,.4),0 0 120px rgba(124,58,237,.2)}}
.orbital-core svg{width:30px;height:30px;fill:none;stroke:rgba(168,85,247,.9);stroke-width:1.5}
.orb-node{position:absolute;width:52px;height:52px;top:50%;left:50%;transform-origin:0 0;z-index:4}
.orb-node-inner{width:52px;height:52px;border-radius:12px;background:rgba(12,10,30,.85);border:1px solid rgba(168,85,247,.22);backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:border-color .3s,box-shadow .3s;margin-left:-26px;margin-top:-26px}
.orb-node-inner:hover{border-color:rgba(168,85,247,.55);box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 20px rgba(168,85,247,.2)}
.orb-node-icon{font-size:18px;line-height:1}
.orb-node-lbl{font-size:8px;color:var(--txt3);font-weight:500;letter-spacing:.04em;text-align:center;font-family:'Sora',sans-serif}

/* ══ PROBLEM SECTION ══ */
.problem-wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--line);align-items:stretch;max-width:1160px;margin:0 auto}
.problem-left{padding:90px 55px 90px 24px;display:flex;flex-direction:column;justify-content:center}
.problem-right{border-left:1px solid var(--line);display:flex;flex-direction:column;gap:12px;padding:60px 36px;justify-content:center;position:relative;overflow:hidden}
.problem-right::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 65% 50%,rgba(124,58,237,.06),transparent 70%);pointer-events:none}
.pain-card{display:flex;align-items:flex-start;gap:13px;background:rgba(255,255,255,.025);border:1px solid var(--line);border-radius:14px;padding:17px 19px;position:relative;overflow:hidden;transition:border-color .35s,transform .35s,box-shadow .35s;cursor:default}
.pain-card::before{content:'';position:absolute;left:0;top:25%;bottom:25%;width:2px;border-radius:2px;background:linear-gradient(to bottom,transparent,var(--p),transparent);opacity:0;transition:opacity .3s}
.pain-card::after{content:'';position:absolute;top:0;right:0;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,.1),transparent 70%);transform:translate(30px,-30px);pointer-events:none}
.pain-card:hover{border-color:rgba(168,85,247,.3);transform:translateX(5px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.pain-card:hover::before{opacity:1}
.pain-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;backgro
