<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qubix | Premium AI Leverage</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           GLOBAL VARIABLES & TOKENS
           ========================================= */
        :root {
            --bg-base: #030305;
            --bg-glass: rgba(255, 255, 255, 0.02);
            --bg-glass-hover: rgba(255, 255, 255, 0.04);
            
            --border-glass: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(124, 58, 237, 0.3);
            
            --c-purple: #7C3AED;
            --c-indigo: #4F46E5;
            --c-blue: #2563EB;
            --c-sky: #0EA5E9;
            
            --text-main: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.65);
            
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --transition-bounce: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* =========================================
           RESET & BASE
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            scroll-behavior: smooth;
            background-color: var(--bg-base);
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-base);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }

        /* =========================================
           PREMIUM BACKGROUND EFFECTS
           ========================================= */
        /* Vignette */
        body::after {
            content: '';
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, transparent 40%, #030305 100%);
            pointer-events: none; z-index: 998;
        }

        /* Expensive Noise Texture */
        .noise {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 999; opacity: 0.04;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Animated Ambient Light Orbs */
        .ambient-light {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            pointer-events: none;
            z-index: 0;
            animation: floatOrb 20s ease-in-out infinite alternate;
        }
        .orb-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--c-purple); animation-delay: 0s; }
        .orb-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: var(--c-indigo); animation-delay: -5s; }
        .orb-3 { top: 40%; left: 60%; width: 40vw; height: 40vw; background: var(--c-sky); opacity: 0.2; animation-delay: -10s; }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 10%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        /* =========================================
           UTILITIES
           ========================================= */
        .container {
            max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 10;
        }
        
        .glass-panel {
            background: var(--bg-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .text-gradient-accent {
            background: linear-gradient(to right, var(--c-sky), var(--c-purple), var(--c-indigo));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .italic-serif {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 400;
        }

        /* =========================================
           TYPOGRAPHY & HEADINGS
           ========================================= */
        h1, h2, h3 { line-height: 1.1; letter-spacing: -0.04em; }
        
        .hero-title {
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 700;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
        }

        .subtitle {
            font-size: clamp(1.1rem, 1.5vw, 1.25rem);
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 48px auto;
            text-align: center;
            font-weight: 400;
        }

        /* =========================================
           NAVIGATION
           ========================================= */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 100;
            padding: 24px 0; transition: var(--transition-smooth);
        }
        nav.scrolled {
            background: rgba(3, 3, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            padding: 16px 0;
        }
        .nav-inner {
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-weight: 800; font-size: 1.5rem; letter-spacing: -0.05em;
            display: flex; align-items: center; gap: 8px; text-decoration: none; color: #fff;
        }
        .logo-dot { width: 8px; height: 8px; background: var(--c-purple); border-radius: 50%; box-shadow: 0 0 10px var(--c-purple); }
        .nav-links { display: flex; gap: 32px; align-items: center; }
        .nav-links a {
            color: var(--text-muted); text-decoration: none; font-size: 0.95rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover { color: #fff; }
        
        .social-icons { display: flex; gap: 16px; }
        .social-icons a {
            color: var(--text-muted); transition: var(--transition-smooth);
            display: flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%; background: var(--bg-glass);
            border: 1px solid var(--border-glass);
        }
        .social-icons a:hover { color: #fff; background: rgba(255,255,255,0.1); transform: translateY(-2px); }

        /* =========================================
           BUTTONS & CTAs
           ========================================= */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 10px;
            padding: 16px 32px; border-radius: 100px; font-weight: 600; font-size: 1rem;
            text-decoration: none; transition: var(--transition-bounce);
            position: relative; overflow: hidden; cursor: pointer; border: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--c-indigo), var(--c-purple));
            color: #fff;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.1) inset, 0 10px 24px -10px var(--c-purple);
        }
        .btn-primary::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 0 1px rgba(255,255,255,0.2) inset, 0 20px 40px -10px var(--c-purple);
        }
        .btn-primary:hover::before { left: 100%; }

        .btn-secondary {
            background: var(--bg-glass); color: #fff;
            border: 1px solid var(--border-glass);
            backdrop-filter: blur(10px);
        }
        .btn-secondary:hover {
            background: var(--bg-glass-hover);
            border-color: rgba(255,255,255,0.2);
        }

        /* =========================================
           HERO SECTION
           ========================================= */
        .hero {
            min-height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; padding-top: 100px; position: relative;
        }
        
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 16px; border-radius: 100px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            font-size: 0.85rem; font-weight: 500; color: #a78bfa;
            margin-bottom: 32px;
        }

        .cta-group {
            display: flex; gap: 16px; justify-content: center; align-items: center; margin-top: 40px;
        }

        /* Hero Social Proof */
        .hero-proof {
            display: flex; align-items: center; gap: 16px;
            margin-top: 60px; padding: 12px 24px; border-radius: 100px;
            background: var(--bg-glass); border: 1px solid var(--border-glass);
        }
        .avatars { display: flex; }
        .avatar {
            width: 40px; height: 40px; border-radius: 50%;
            border: 2px solid var(--bg-base); margin-left: -12px;
            object-fit: cover;
        }
        .avatar:first-child { margin-left: 0; }
        .proof-text { text-align: left; font-size: 0.9rem; color: var(--text-muted); }
        .stars { color: #F59E0B; letter-spacing: 2px; font-size: 0.8rem; margin-bottom: 2px; }

        /* Floating Parallax Elements */
        .floating-ui {
            position: absolute; pointer-events: none; z-index: -1;
            opacity: 0.6; filter: blur(1px);
        }
        .ui-1 { top: 20%; left: 10%; width: 200px; height: 120px; border-radius: 16px; background: linear-gradient(135deg, rgba(255,255,255,0.05), transparent); border: 1px solid rgba(255,255,255,0.05); }
        .ui-2 { bottom: 20%; right: 10%; width: 150px; height: 150px; border-radius: 50%; background: radial-gradient(circle, rgba(124, 58, 237, 0.1), transparent); border: 1px solid rgba(124, 58, 237, 0.2); }

        /* =========================================
           FEATURES SECTION
           ========================================= */
        .features { padding: 120px 0; }
        .bento-grid {
            display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px;
            margin-top: 60px;
        }
        .feature-card {
            padding: 40px; display: flex; flex-direction: column; justify-content: space-between;
        }
        /* Moving ray effect on border hover */
        .feature-card::before {
            content: ""; position: absolute; inset: 0; border-radius: inherit;
            padding: 1px; /* border width */
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.5s ease;
        }
        .feature-card:hover {
            transform: translateY(-5px); border-color: rgba(255,255,255,0.15);
        }
        .feature-card:hover::before {
            opacity: 1; animation: sweep 2s linear infinite;
        }
        @keyframes sweep {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }

        .col-8 { grid-column: span 8; }
        .col-4 { grid-column: span 4; }
        
        .feature-icon {
            width: 56px; height: 56px; border-radius: 16px; background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
            border: 1px solid var(--border-glass); font-size: 1.5rem;
        }
        .feature-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 12px; }
        .feature-desc { color: var(--text-muted); font-size: 0.95rem; }

        /* =========================================
           STATS SECTION
           ========================================= */
        .stats { padding: 80px 0; border-top: 1px solid var(--border-glass); border-bottom: 1px solid var(--border-glass); background: rgba(0,0,0,0.2); }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 40px; text-align: center; }
        .stat-number { font-size: 4rem; font-family: 'Playfair Display', serif; font-weight: 600; margin-bottom: 8px; color: var(--text-main); }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }

        /* =========================================
           PRICING SECTION
           ========================================= */
        .pricing { padding: 120px 0; }
        .pricing-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 32px; max-width: 900px; margin: 0 auto; }
        .price-card { padding: 48px; text-align: left; }
        .price-card.premium {
            background: linear-gradient(180deg, rgba(124, 58, 237, 0.05) 0%, transparent 100%);
            border-color: rgba(124, 58, 237, 0.3);
            box-shadow: 0 20px 80px -20px rgba(124, 58, 237, 0.15);
        }
        .price-header { margin-bottom: 32px; }
        .price-name { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px; }
        .price-amt { font-size: 3rem; font-weight: 700; margin-bottom: 8px; }
        .price-amt span { font-size: 1rem; color: var(--text-muted); font-weight: 400; }
        .feature-list { list-style: none; margin-bottom: 40px; }
        .feature-list li { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: var(--text-muted); font-size: 0.95rem; }
        .check { color: var(--c-sky); }

        /* =========================================
           FOOTER
           ========================================= */
        footer { padding: 60px 0; border-top: 1px solid var(--border-glass); text-align: center; color: var(--text-muted); }

        /* =========================================
           ANIMATION SYSTEM (SCROLL REVEAL)
           ========================================= */
        .reveal {
            opacity: 0; transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }

        /* Responsive */
        @media (max-width: 992px) {
            .hero-title { font-size: 3.5rem; }
            .col-8, .col-4 { grid-column: span 12; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 40px; }
            .pricing-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-title { font-size: 2.8rem; }
            .cta-group { flex-direction: column; width: 100%; }
            .btn { width: 100%; }
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
