<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qubix — Kill the Chaos. Crown the Flow.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════
   ROOT TOKENS
════════════════════════════════════════════════ */
:root {
  --bg:        #06050F;
  --bg1:       #0C0B18;
  --bg2:       #110F20;
  --bg3:       #18162C;
  --line:      rgba(255,255,255,0.06);
  --line2:     rgba(255,255,255,0.10);
  --line3:     rgba(255,255,255,0.16);
  --txt:       #F5F3FF;
  --txt2:      #9991C4;
  --txt3:      #4A4570;
  --purple:    #7C3AED;
  --purple2:   #9333EA;
  --accent:    #A855F7;
  --pink:      #EC4899;
  --amber:     #F97316;
  --teal:      #14B8A6;
  --red:       #EF4444;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--txt);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 3px; }

/* ════════════════════════════════════════════════
   GRAIN
════════════════════════════════════════════════ */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 998;
  pointer-events: none; opacity: 0.035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

/* ════════════════════════════════════════════════
   CURSOR
════════════════════════════════════════════════ */
#qcur {
  position: fixed; width: 10px; height: 10px;
  background: rgba(168,85,247,0.9); border-radius: 50%;
  pointer-events: none; z-index: 9999;
  transform: translate(-50%,-50%);
  box-shadow: 0 0 20px rgba(168,85,247,0.6);
  transition: width .15s, height .15s;
}
#qring {
  position: fixed; width: 36px; height: 36px;
  border: 1px solid rgba(168,85,247,0.3); border-radius: 50%;
  pointer-events: none; z-index: 9998;
  transform: translate(-50%,-50%);
}

/* ════════════════════════════════════════════════
   CANVAS BG
════════════════════════════════════════════════ */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ════════════════════════════════════════════════
   NAV — Surge style: left links | center logo | right links+CTA
════════════════════════════════════════════════ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 64px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid var(--line);
  background: rgba(6,5,15,0.75);
  backdrop-filter: blur(24px) saturate(180%);
  transition: border-color .3s;
}
.nav-left { display: flex; align-items: center; gap: 4px; }
.nav-center {
  position: absolute; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 10px;
  font-family: 'Sora', sans-serif;
  font-weight: 700; font-size: 16px; letter-spacing: -.03em;
  color: var(--txt); text-decoration: none;
}
.nav-logo-icon {
  width: 32px; height: 32px; border-radius: 9px;
  background: linear-gradient(135deg, var(--purple), var(--pink));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(124,58,237,0.5);
}
.nav-right { display: flex; align-items: center; gap: 8px; }
.nav-link {
  font-size: 13.5px; font-weight: 450; color: var(--txt2);
  text-decoration: none; padding: 6px 14px; border-radius: 8px;
  transition: color .2s, background .2s;
}
.nav-link:hover { color: var(--txt); background: rgba(255,255,255,0.05); }
.nav-btn-ghost {
  padding: 7px 16px; font-size: 13px; font-weight: 500;
  color: var(--txt2); border: 1px solid var(--line2);
  background: transparent; border-radius: 10px;
  cursor: pointer; text-decoration: none; transition: all .2s;
}
.nav-btn-ghost:hover { color: var(--txt); border-color: var(--line3); }
.nav-btn-cta {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px; font-size: 13px; font-weight: 600; color: #fff;
  background: var(--purple2); border-radius: 10px;
  cursor: pointer; text-decoration: none; border: none;
  transition: all .25s;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08) inset, 0 4px 20px rgba(147,51,234,0.4);
}
.nav-btn-cta:hover { background: var(--accent); box-shadow: 0 4px 30px rgba(168,85,247,0.5); transform: translateY(-1px); }
.social-icon {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--line2); background: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--txt2);
  text-decoration: none; transition: all .2s;
}
.social-icon:hover { border-color: var(--line3); color: var(--txt); }

/* ════════════════════════════════════════════════
   HERO — Zentra/Nuvio style with diagonal beams
════════════════════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center;
  padding: 130px 40px 80px;
  position: relative; overflow: hidden;
}
/* Radial purple glow behind hero — Zentra style */
.hero-glow {
  position: absolute;
  top: -10%; left: 50%; transform: translateX(-50%);
  width: 900px; height: 700px;
  border-radius: 50%;
  background: radial-gradient(ellipse at center, rgba(124,58,237,0.22) 0%, rgba(124,58,237,0.08) 40%, transparent 70%);
  filter: blur(60px);
  pointer-events: none;
  animation: glowPulse 6s ease-in-out infinite alternate;
}
@keyframes glowPulse {
  0% { opacity: 0.8; transform: translateX(-50%) scale(1); }
  100% { opacity: 1; transform: translateX(-50%) scale(1.08); }
}
/* Diagonal light beams — Nuvio style */
.beam {
  position: absolute; pointer-events: none;
  background: linear-gradient(to bottom, transparent, rgba(168,85,247,0.12), transparent);
  transform-origin: top;
}
.beam-left {
  width: 2px; height: 100vh;
  top: 0; left: 18%;
  transform: rotate(25deg);
  animation: beamFloat 8s ease-in-out infinite alternate;
}
.beam-right {
  width: 2px; height: 100vh;
  top: 0; right: 18%;
  transform: rotate(-25deg);
  animation: beamFloat 8s ease-in-out infinite alternate-reverse;
}
.beam-left2 {
  width: 1px; height: 80vh;
  top: 0; left: 8%;
  transform: rotate(35deg); opacity: 0.5;
  animation: beamFloat 10s ease-in-out infinite alternate;
}
.beam-right2 {
  width: 1px; height: 80vh;
  top: 0; right: 8%;
  transform: rotate(-35deg); opacity: 0.5;
  animation: beamFloat 10s ease-in-out infinite alternate-reverse;
}
@keyframes beamFloat {
  0% { opacity: 0.4; }
  100% { opacity: 0.9; }
}

.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 8px 6px 12px;
  background: rgba(124,58,237,0.1);
  border: 1px solid rgba(124,58,237,0.22);
  border-radius: 100px; margin-bottom: 32px;
  font-size: 12px; font-weight: 500; color: var(--txt2);
  position: relative; z-index: 2;
  animation: fadeUp .8s cubic-bezier(.16,1,.3,1) both;
}
.hero-badge-inner {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 10px; background: var(--purple2);
  border-radius: 100px; font-size: 10.5px; font-weight: 700;
  color: #fff; text-transform: uppercase; letter-spacing: .04em;
}
/* Proof avatars */
.proof-wrap { display: flex; align-items: center; gap: 8px; }
.proof-avs { display: flex; }
.proof-av {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--bg);
  font-size: 8px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center;
  margin-left: -6px; flex-shrink: 0;
}
.proof-av:first-child { margin-left: 0; }

/* Hero headline — Zentra bold + Playfair italic */
.hero-h1 {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: clamp(52px, 8vw, 108px);
  letter-spacing: -.04em;
  line-height: .92;
  color: var(--txt);
  max-width: 800px;
  margin-bottom: 8px;
  position: relative; z-index: 2;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .1s both;
}
.hero-h1-italic {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-weight: 700;
  background: linear-gradient(135deg, #fff 0%, #C084FC 40%, #EC4899 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}
.hero-sub {
  font-size: clamp(15px, 1.5vw, 17px); color: var(--txt2);
  max-width: 460px; line-height: 1.65; font-weight: 400;
  margin: 20px auto 40px;
  position: relative; z-index: 2;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .2s both;
}
/* Email input — Nuvio style */
.hero-input-wrap {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--line3);
  border-radius: 14px; padding: 6px 6px 6px 18px;
  max-width: 440px; width: 100%;
  position: relative; z-index: 2;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .3s both;
  margin: 0 auto;
  transition: border-color .3s;
}
.hero-input-wrap:focus-within {
  border-color: rgba(168,85,247,0.5);
  box-shadow: 0 0 0 3px rgba(168,85,247,0.08);
}
.hero-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; color: var(--txt);
}
.hero-input::placeholder { color: var(--txt3); }
.hero-cta-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 11px 22px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13.5px; font-weight: 600; color: #fff;
  background: linear-gradient(135deg, var(--purple), var(--purple2));
  border: none; border-radius: 9px; cursor: pointer;
  white-space: nowrap;
  transition: all .25s;
  box-shadow: 0 4px 20px rgba(124,58,237,0.4);
}
.hero-cta-btn:hover { background: linear-gradient(135deg, var(--purple2), var(--accent)); box-shadow: 0 4px 30px rgba(168,85,247,0.5); }
.hero-proof {
  margin-top: 20px;
  font-size: 12px; color: var(--txt3);
  display: flex; align-items: center; gap: 8px; justify-content: center;
  position: relative; z-index: 2;
  animation: fadeUp .9s cubic-bezier(.16,1,.3,1) .4s both;
}
.hero-stars { color: #F59E0B; letter-spacing: 1px; font-size: 11px; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Dashboard mockup floating below input */
.hero-mockup {
  position: relative; z-index: 2;
  margin-top: 64px;
  width: 100%; max-width: 880px;
  border-radius: 20px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset, 0 60px 100px rgba(0,0,0,0.8), 0 0 100px rgba(124,58,237,0.12);
  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) .5s both;
  /* Subtle floating */
  animation: fadeUp 1s cubic-bezier(.16,1,.3,1) .5s both, heroFloat 8s ease-in-out 1.5s infinite;
}
@keyframes heroFloat {
  0%,100% { transform: translateY(0) perspective(1000px) rotateX(1deg); }
  50% { transform: translateY(-10px) perspective(1000px) rotateX(1deg); }
}
.mockup-bar {
  background: rgba(15,12,30,0.95);
  padding: 10px 16px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--line);
}
.m-dot { width: 10px; height: 10px; border-radius: 50%; }
.mockup-body {
  background: rgba(10,8,22,0.9);
  padding: 24px;
  display: grid; grid-template-columns: 180px 1fr;
  gap: 16px; min-height: 260px;
}
.mockup-sidebar {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--line);
  border-radius: 12px; padding: 16px;
}
.mockup-sidebar-item {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; border-radius: 8px;
  font-size: 12px; color: var(--txt3); margin-bottom: 2px;
  cursor: default; transition: all .2s;
}
.mockup-sidebar-item.active {
  background: rgba(124,58,237,0.15);
  color: var(--accent);
}
.mockup-sidebar-item .si-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0;
}
.mockup-main { display: flex; flex-direction: column; gap: 12px; }
.mockup-stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.m-stat {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--line);
  border-radius: 10px; padding: 14px;
}
.m-stat-label { font-size: 10px; color: var(--txt3); margin-bottom: 4px; }
.m-stat-val { font-size: 18px; font-weight: 700; letter-spacing: -.03em; color: var(--txt); }
.m-stat-change { font-size: 10px; color: #10B981; margin-top: 2px; }
.m-chart-area {
  background: rgba(255,255,255,0.02);
  border: 1px solid var(--line); border-radius: 10px; padding: 14px;
  flex: 1; display: flex; flex-direction: column; justify-content: space-between;
}
.m-chart-label { font-size: 10px; color: var(--txt3); }
.m-bars { display: flex; align-items: flex-end; gap: 4px; height: 60px; margin-top: 8px; }
.m-bar { flex: 1; border-radius: 3px 3px 0 0; background: rgba(124,58,237,0.2); transition: background .5s; }
.m-bar.hi { background: linear-gradient(to top, #7C3AED, #C084FC); animation: barRise .8s cubic-bezier(.16,1,.3,1) both; }
@keyframes barRise { from { transform: scaleY(0); transform-origin: bottom; } to { transform: scaleY(1); } }

/* ════════════════════════════════════════════════
   LOGO BAR
════════════════════════════════════════════════ */
.logo-section {
  padding: 48px 0;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
  position: relative; z-index: 1; overflow: hidden;
}
.logo-section-label {
  text-align: center; font-size: 11px; font-weight: 500;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--txt3); margin-bottom: 28px;
}
.logo-track {
  overflow: hidden;
  -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 12%, #000 88%, transparent 100%);
  mask-image: linear-gradient(to right, transparent 0%, #000 12%, #000 88%, transparent 100%);
}
.logo-inner {
  display: flex; align-items: center;
  animation: logoScroll 28s linear infinite;
  width: max-content;
}
.logo-inner:hover { animation-play-state: paused; }
@keyframes logoScroll { to { transform: translateX(-50%); } }
.logo-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 28px;
  border-right: 1px solid var(--line);
  font-size: 13px; font-weight: 600; color: var(--txt3);
  white-space: nowrap; transition: color .2s;
}
.logo-chip:hover { color: var(--txt2); }

/* ════════════════════════════════════════════════
   SECTION BASE
════════════════════════════════════════════════ */
.section {
  padding: 100px 40px;
  max-width: 1180px; margin: 0 auto;
  position: relative; z-index: 1;
}
.eyebrow {
  font-size: 11px; font-weight: 600; letter-spacing: .12em;
  text-transform: uppercase; color: var(--txt3); margin-bottom: 16px;
}
.section-title {
  font-family: 'Sora', sans-serif;
  font-weight: 800;
  font-size: clamp(36px, 5vw, 60px);
  letter-spacing: -.04em; line-height: .95;
  color: var(--txt); margin-bottom: 16px;
}
.section-title-serif {
  font-family: 'Playfair Display', serif;
  font-style: italic; font-weight: 700;
  font-size: clamp(36px, 5vw, 60px);
  letter-spacing: -.03em; line-height: .95;
  color: var(--txt); margin-bottom: 16px;
}
.section-body {
  font-size: 15.5px; color: var(--txt2);
  line-height: 1.65; font-weight: 400; max-width: 520px;
}

/* ════════════════════════════════════════════════
   SECTION 1 — ORANGE VOLUMETRIC HERO 
   (Image 2 reference: split layout, big glowing orb)
════════════════════════════════════════════════ */
.vol-section {
  padding: 0;
  position: relative; overflow: hidden; z-index: 1;
  min-height: 100vh;
  display: grid; grid-template-columns: 1fr 1fr;
  border-top: 1px solid var(--line);
}
.vol-left {
  padding: 100px 60px 100px 40px;
  display: flex; flex-direction: column; justify-content: center;
  position: relative; z-index: 2;
}
.vol-left-max { max-width: 520px; }
.vol-right {
  position: relative; overflow: hidden;
  background: radial-gradient(ellipse 80% 70% at 60% 40%, rgba(249,115,22,0.15) 0%, rgba(124,58,237,0.08) 50%, transparent 80%);
}
/* The big volumetric orange-to-purple orb */
.vol-orb-wrap {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.vol-orb {
  width: 480px; height: 480px; border-radius: 50%;
  background: radial-gradient(ellipse at 35% 30%, rgba(255,200,80,0.25) 0%, rgba(249,115,22,0.15) 25%, rgba(124,58,237,0.1) 55%, transparent 80%);
  filter: blur(40px);
  animation: orbPulse 6s ease-in-out infinite alternate;
}
@keyframes orbPulse {
  0% { transform: scale(0.95); opacity: 0.8; }
  100% { transform: scale(1.05); opacity: 1; }
}
/* Starburst in center */
.vol-star {
  position: absolute; top: 50%; left: 55%;
  transform: translate(-50%,-50%);
  width: 160px; height: 160px;
  animation: starSpin 20s linear infinite;
}
.vol-star-ring {
  position: absolute; inset: 0;
  border-radius: 50%;
  border: 1px solid rgba(255,200,80,0.15);
  animation: ringExpand 3s ease-out infinite;
}
.vol-star-ring:nth-child(2) { animation-delay: 1s; }
.vol-star-ring:nth-child(3) { animation-delay: 2s; }
@keyframes ringExpand {
  0% { transform: scale(0.5); opacity: 0.8; }
  100% { transform: scale(2.5); opacity: 0; }
}
@keyframes starSpin {
  to { transform: translate(-50%,-50%) rotate(360deg); }
}
.vol-star-core {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  width: 32px; height: 32px;
  background: radial-gradient(circle, #fff 0%, rgba(255,200,80,0.8) 40%, transparent 100%);
  border-radius: 50%;
  box-shadow: 0 0 60px rgba(255,200,80,0.8), 0 0 120px rgba(249,115,22,0.4);
  animation: coreFlicker 4s ease-in-out infinite alternate;
}
@keyframes coreFlicker {
  0% { transform: translate(-50%,-50%) scale(1); box-shadow: 0 0 60px rgba(255,200,80,0.8), 0 0 120px rgba(249,115,22,0.4); }
  100% { transform: translate(-50%,-50%) scale(1.2); box-shadow: 0 0 80px rgba(255,255,255,0.9), 0 0 160px rgba(249,115,22,0.6); }
}
/* Dashboard card overlay */
.vol-card {
  position: absolute; bottom: 40px; left: 40px; right: 40px;
  background: rgba(12,10,24,0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px; padding: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.vol-card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.vol-card-title { font-size: 12px; font-weight: 600; color: var(--txt); }
.vol-card-badge {
  padding: 3px 10px; font-size: 10px; font-weight: 700;
  background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3);
  border-radius: 100px; color: #10B981;
}
.vol-bars { display: flex; align-items: flex-end; gap: 5px; height: 50px; }
.vol-bar { flex: 1; border-radius: 3px 3px 0 0; }

/* ════════════════════════════════════════════════
   SECTION 2 — PLANET ORB
   (Image 3 reference: dark sphere with starburst)
════════════════════════════════════════════════ */
.planet-section {
  position: relative; z-index: 1;
  padding: 120px 40px; text-align: center;
  overflow: hidden;
  border-top: 1px solid var(--line);
}
.planet-wrap {
  position: relative; width: 360px; height: 360px;
  margin: -20px auto 60px;
}
.planet-sphere {
  position: absolute; inset: 0; border-radius: 50%;
  background: radial-gradient(ellipse at 35% 30%, rgba(80,40,20,0.9) 0%, rgba(30,15,5,0.95) 40%, #0A0700 70%);
  border: 1px solid rgba(249,115,22,0.1);
  overflow: hidden;
  box-shadow: 0 0
