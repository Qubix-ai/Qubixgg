/* ═══════════════════════════════════════════
   DESIGN TOKENS — Qubix Brand
═══════════════════════════════════════════ */
:root {
  --bg:          #07051A;
  --bg1:         #0D0B26;
  --bg2:         #130F33;
  --bg3:         #1A1540;

  --p1:          #5B21B6;
  --p2:          #7C3AED;
  --p3:          #9333EA;
  --p4:          #A855F7;
  --p5:          #C084FC;

  --pk:          #EC4899;
  --pk2:         #F472B6;

  --teal:        #14B8A6;
  --amber:       #F59E0B;
  --green:       #10B981;
  --red:         #EF4444;

  --txt:         #F8F7FF;
  --txt2:        #A8A4C8;
  --txt3:        #5C5880;

  --glass:       rgba(255,255,255,0.04);
  --glass-b:     rgba(255,255,255,0.07);
  --glass-hover: rgba(255,255,255,0.09);

  --border:      rgba(255,255,255,0.07);
  --border2:     rgba(255,255,255,0.12);
  --border3:     rgba(255,255,255,0.18);

  --grd:         linear-gradient(135deg, var(--p2), var(--p4), var(--pk));
  --grd-r:       linear-gradient(135deg, var(--pk), var(--p4), var(--p2));

  --r-sm:        8px;
  --r-md:        14px;
  --r-lg:        20px;
  --r-xl:        28px;
  --r-2xl:       40px;

  --shadow:      0 25px 60px rgba(0,0,0,0.5);
  --glow-p:      0 0 80px rgba(124,58,237,0.25);
  --glow-pk:     0 0 80px rgba(236,72,153,0.2);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--txt);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Noise grain */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 999;
  pointer-events: none; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--p2); border-radius: 4px; }

/* ═══════════════════════════════════════════
   CURSOR
═══════════════════════════════════════════ */
#cursor { position: fixed; width: 10px; height: 10px; background: var(--p4); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); box-shadow: 0 0 15px rgba(168,85,247,0.7); transition: width .15s, height .15s, background .15s; }
#cursor-ring { position: fixed; width: 38px; height: 38px; border: 1px solid rgba(168,85,247,0.35); border-radius: 50%; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); transition: transform .1s linear, width .2s, height .2s, border-color .2s; }

/* ═══════════════════════════════════════════
   BG CANVAS
═══════════════════════════════════════════ */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.6; }

/* ═══════════════════════════════════════════
   UTILITY
═══════════════════════════════════════════ */
.grad-text {
  background: var(--grd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.container { max-width: 1160px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
.section { padding: 110px 0; }
.section-sm { padding: 70px 0; }
.eyebrow {

}
.eyebrow .dot { width: 5px; height: 5px; background: var(--p4); border-radius: 50%; animation: blink 2s ease infinite; }

.btn-primary {

}
.btn-primary::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px rgba(124,58,237,0.6); }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 8px;

  transition: all .25s; letter-spacing: -.01em;
}
.btn-ghost:hover { background: var(--glass-hover); border-color: var(--border3); transform: translateY(-1px); }

.reveal { opacity: 0; transform: translateY(30px); transition: opacity .65s cubic-bezier(.16,1,.3,1), transform .65s cubic-bezier(.16,1,.3,1); }
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal-d1 { transition-delay: .08s; }
.reveal-d2 { transition-delay: .16s; }
.reveal-d3 { transition-delay: .24s; }

/* ═══════════════════════════════════════════
   NAV
═══════════════════════════════════════════ */
nav {

.nav-links a { padding: 7px 14px; font-size: 14px; font-weight: 500; color: var(--txt2); text-decoration: none; border-radius: var(--r-sm); transition: color .2s, background .2s; }
.nav-links a:hover { color: var(--txt); background: var(--glass); }

.nav-cta { padding: 9px 22px; font-size: 14px; font-weight: 700; color: #fff; background: var(--grd); border: none; border-radius: var(--r-md); cursor: pointer; text-decoration: none; transition: all .25s; box-shadow: 0 4px 20px rgba(124,58,237,0.4); }
.nav-cta:hover { box-shadow: 0 4px 30px rgba(124,58,237,0.6); transform: translateY(-1px); }

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
#hero {
  min-height: 100vh;

}
.hero-glow-top {

/* Left & right diagonal light shafts */

.shaft-l { left: 15%; transform: rotate(20deg); transform-origin: top; }
.shaft-r { right: 15%; transform: rotate(-20deg); transform-origin: top; animation-delay: 2s; }
.shaft-ll { left: 5%; opacity: .5; transform: rotate(30deg); transform-origin: top; animation-delay: 1s; }

/* Trust bar */
.trust-bar {
  display: flex; align-items: center; gap: 16px;

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════

═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   SOLUTION
═══════════════════════════════════════════ */
.solution-section { background: var(--bg1); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
